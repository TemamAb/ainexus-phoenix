<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #1A1D21; color: #ECF0F1; font-family: 'Inter'; margin: 0; padding: 2rem; }
        .admin-grid { display: grid; gap: 1rem; grid-template-columns: 1fr 1fr; }
        .admin-panel { background: #2F3640; border: 1px solid #2F3640; padding: 1.5rem; }
        .panel-title { color: #4FC3F7; font-weight: 500; margin-bottom: 1rem; }
        .setting-group { margin-bottom: 1rem; }
        .setting-label { display: block; margin-bottom: 0.5rem; color: #BDC3C7; }
        .setting-input { background: #1A1D21; color: #ECF0F1; border: 1px solid #1A1D21; padding: 0.5rem; width: 100%; }
        .validate-btn { background: #4FC3F7; color: #1A1D21; border: none; padding: 1rem 2rem; font-weight: 500; cursor: pointer; }
    </style>
</head>
<body>
    <h1>AINEXUS ADMIN COMMAND CENTER</h1>
    <div class="admin-grid">
        <div class="admin-panel">
            <div class="panel-title">System Integrity</div>
            <button class="validate-btn">VALIDATE NEXUS CORE</button>
        </div>
        <div class="admin-panel">
            <div class="panel-title">Engine Core Settings</div>
            <div class="setting-group">
                <label class="setting-label">Confidence Threshold (%)</label>
                <input type="number" class="setting-input" value="85" min="50" max="99">
            </div>
            <div class="setting-group">
                <label class="setting-label">Minimum Profit Delta (USD)</label>
                <input type="number" class="setting-input" value="15.00" step="0.01">
            </div>
        </div>
    </div>
</body>
</html>
