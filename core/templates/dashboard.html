<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AINEXUS // AUTONOMOUS INTELLIGENCE</title>
    <style>
        :root {
            --bg-primary: #1A1D21;
            --bg-card: #2F3640;
            --accent-blue: #4FC3F7;
            --profit-green: #66BB6A;
            --text-primary: #ECF0F1;
            --text-secondary: #BDC3C7;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg-primary); 
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-weight: 400;
        }
        
        /* HEADER - TOR COMPLIANT */
        .header-bar {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--bg-card);
        }
        .brand { 
            font-size: 1.5rem; 
            color: var(--accent-blue);
            font-weight: 600;
        }
        .header-center { text-align: center; }
        .system-status {
            background: var(--profit-green);
            color: var(--bg-primary);
            padding: 0.5rem 1rem;
            font-weight: 500;
        }
        .header-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            justify-content: flex-end;
        }
        .price-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .toggle-btn {
            background: transparent;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            padding: 0.25rem 0.5rem;
            cursor: pointer;
        }
        .refresh-control select {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--bg-card);
            padding: 0.25rem;
        }

        /* MAIN GRID - TOR COMPLIANT LAYOUT */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* THE ARENA - LIVE VISUALIZATION */
        .arena-container {
            background: var(--bg-card);
            border: 1px solid var(--bg-card);
            min-height: 400px;
            position: relative;
            overflow: hidden;
        }
        .arena-pulse {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border: 2px solid var(--accent-blue);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }

        /* ANALYTICS CARDS - MINIMALIST DESIGN */
        .analytics-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .metric-card {
            background: var(--bg-card);
            border: 1px solid var(--bg-card);
            padding: 1.5rem;
        }
        .metric-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            font-weight: 400;
        }
        .metric-value {
            color: var(--text-primary);
            font-size: 2rem;
            font-weight: 500;
        }
        .metric-subvalue {
            color: var(--profit-green);
            font-size: 0.9rem;
            font-weight: 400;
        }

        /* ACTIVATION CONTROL */
        .activation-section {
            grid-column: 1 / -1;
            text-align: center;
            margin-top: 2rem;
        }
        .activate-btn {
            background: var(--accent-blue);
            color: var(--bg-primary);
            border: none;
            padding: 1rem 3rem;
            font-size: 1.2rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .activate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* PREFERENCES PANEL */
        .preferences {
            background: var(--bg-card);
            padding: 1.5rem;
            margin-top: 2rem;
        }
        .pref-group {
            margin-bottom: 1rem;
        }
        .pref-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 400;
        }
        .pref-select {
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--bg-primary);
            padding: 0.5rem;
            width: 100%;
        }

        /* COUNTDOWN SEQUENCE */
        .countdown-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .countdown-timer {
            font-size: 4rem;
            color: var(--accent-blue);
            margin: 2rem 0;
            font-weight: 500;
        }
        .countdown-status {
            color: var(--text-secondary);
            margin-bottom: 1rem;
            font-weight: 400;
        }
        .confidence-badge {
            color: var(--profit-green);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- HEADER - TOR COMPLIANT -->
    <div class="header-bar">
        <div class="brand">AINEXUS</div>
        <div class="header-center">
            <div class="system-status">SYSTEM ACTIVE</div>
        </div>
        <div class="header-controls">
            <div class="price-toggle">
                <span class="price">ETH/USD: --</span>
                <button class="toggle-btn">[ETH/USD]</button>
            </div>
            <div class="refresh-control">
                <select>
                    <option>1 sec</option>
                    <option>5 sec</option>
                    <option selected>10 sec</option>
                    <option>30 sec</option>
                </select>
            </div>
            <div class="wallet-address">0x1a2...b3c4</div>
        </div>
    </div>

    <!-- MAIN DASHBOARD GRID -->
    <div class="dashboard-grid">
        <!-- THE ARENA -->
        <div class="arena-container">
            <div class="arena-pulse"></div>
            <!-- Live animations will be injected here -->
        </div>

        <!-- ANALYTICS CARDS -->
        <div class="analytics-grid">
            <div class="metric-card">
                <div class="metric-label">Total Profit</div>
                <div class="metric-value">$0.00</div>
                <div class="metric-subvalue">+$0.00 today</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Avg. Profit/Trade</div>
                <div class="metric-value">$0.00</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Trades</div>
                <div class="metric-value">0</div>
                <div class="metric-subvalue">0 this week</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Reinvestment Balance</div>
                <div class="metric-value">$0.00</div>
                <button class="toggle-btn" style="margin-top: 0.5rem;">Withdraw</button>
            </div>
        </div>
    </div>

    <!-- ACTIVATION CONTROL -->
    <div class="activation-section">
        <button class="activate-btn" id="activateBtn">ACTIVATE AINEXUS</button>
    </div>

    <!-- PREFERENCES PANEL -->
    <div class="preferences">
        <div class="pref-group">
            <label class="pref-label">Withdrawal Mode</label>
            <select class="pref-select">
                <option>Auto-Sweep Profits</option>
                <option>Manual</option>
            </select>
        </div>
        <div class="pref-group">
            <label class="pref-label">Risk Profile</label>
            <select class="pref-select">
                <option>Conservative</option>
                <option selected>Balanced</option>
                <option>Aggressive</option>
            </select>
        </div>
        <div class="pref-group">
            <label class="pref-label">Profit Reinvestment</label>
            <select class="pref-select">
                <option selected>Reinvest 100% of Profits</option>
                <option>Send Profits to My Wallet</option>
            </select>
        </div>
    </div>

    <!-- COUNTDOWN SEQUENCE (HIDDEN INITIALLY) -->
    <div class="countdown-screen" id="countdownScreen" style="display: none;">
        <div class="countdown-timer" id="countdownTimer">00:10:00</div>
        <div class="countdown-status">Finalizing optimal strategies...</div>
        <div class="countdown-status">Securing flash loan routes...</div>
        <div class="countdown-status">Optimizing for maximum profit...</div>
        <div class="countdown-status confidence-badge">AI Confidence > 85% ✓</div>
    </div>

    <script>
        // TOR-COMPLIANT INTERACTIVITY
        document.getElementById('activateBtn').addEventListener('click', function() {
            // Show countdown sequence
            document.getElementById('countdownScreen').style.display = 'flex';
            
            // Start countdown timer
            let timeLeft = 600; // 10 minutes
            const timer = setInterval(() => {
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                document.getElementById('countdownTimer').textContent = 
                    `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    // Transition to live dashboard
                    document.getElementById('countdownScreen').style.display = 'none';
                    document.querySelector('.system-status').textContent = 'SYSTEM ACTIVE';
                    // Start live profit animations
                    startLiveOperations();
                }
            }, 1000);
        });

        function startLiveOperations() {
            // The Arena animations and live data updates would start here
            console.log("AINEXUS LIVE - Starting profit generation...");
        }

        // ETH/USD Toggle functionality
        document.querySelector('.toggle-btn').addEventListener('click', function() {
            const priceElement = document.querySelector('.price');
            const toggleBtn = document.querySelector('.toggle-btn');
            
            if (priceElement.textContent.includes('ETH/USD')) {
                priceElement.textContent = 'BTC/USD: --';
                toggleBtn.textContent = '[BTC/USD]';
            } else {
                priceElement.textContent = 'ETH/USD: --';
                toggleBtn.textContent = '[ETH/USD]';
            }
        });
    </script>
</body>
</html>
