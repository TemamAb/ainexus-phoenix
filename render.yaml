services:
  - type: web
    name: ainexus-quantum-arbitrage
    env: python
    plan: free
    numInstances: 1
    buildCommand: pip install -r requirements.txt
    startCommand: python core/app.py
    envVars:
      - key: PORT
        value: 8080
      - key: PYTHONUTF8
        value: 1
    healthCheckPath: /health
