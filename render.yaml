services:
  - type: web
    name: ainexus-96-module-engine
    env: docker
    docker:
      dockerfile: Dockerfile
    envVars:
      - key: PYTHONUNBUFFERED
        value: true
      - key: ENVIRONMENT
        value: production
      - key: UTF-8_MODE
        value: enforced
    healthCheckPath: /health
    autoDeploy: true
