services:
  ainexus-production-engine:
    type: web
    name: ainexus-production-engine
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main_arbitrage_engine.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DEPLOYMENT_ENV
        value: production
    plan: free
    autoDeploy: true
